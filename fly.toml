# fly.toml app configuration file generated for today-okazu-app on 2026-06-01T00:10:27+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'today-okazu-app'
primary_region = 'nrt'
console_command = 'php /var/www/html/artisan tinker'

[build]
  [build.args]
    NODE_VERSION = '18'
    PHP_VERSION = '8.4'

[env]
  APP_ENV = 'production'
  APP_URL = 'https://today-okazu-app.fly.dev'
  APP_LOCALE = 'ja'
  APP_TIMEZONE = 'Asia/Tokyo'
  APP_FAKER_LOCALE = 'ja_JP'
  LOG_CHANNEL = 'stderr'
  LOG_LEVEL = 'info'
  LOG_STDERR_FORMATTER = 'Monolog\Formatter\JsonFormatter'
  SESSION_DRIVER = 'cookie'
  SESSION_SECURE_COOKIE = 'true'
  DB_CONNECTION = 'pgsql'
  DB_HOST = 'today-okazu-db-postgres.flycast'
  DB_PORT = '5432'
  DB_DATABASE = 'postgres'
  DB_USERNAME = 'postgres'
  VITE_APP_NAME = "今日のおかずなんにしよ"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
